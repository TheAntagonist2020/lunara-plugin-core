# Lunara Plugin Core Workflow Feature Implementation With Regression Test

## Action

Follow the feature-implementation-with-regression-test workflow:
1. Edit or add implementation in includes/class-lunara-debrief-suggestions.php
2. Update or add corresponding test in tests/debrief-suggestions-regression.php
3. Commit both implementation and test changes together

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: includes/class-lunara-debrief-suggestions.php, tests/debrief-suggestions-regression.php

