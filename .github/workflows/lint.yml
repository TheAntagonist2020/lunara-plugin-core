name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Core lifecycle contracts
        run: php tests/core-lifecycle-regression.php

      - name: Debrief data contracts
        run: php tests/debrief-contract-regression.php

      - name: Debrief migration contracts
        run: php tests/debrief-migration-regression.php

      - name: Debrief reconciliation contracts
        run: php tests/debrief-reconciliation-regression.php

      - name: Debrief suggestion contracts
        run: php tests/debrief-suggestions-regression.php

      - name: Debrief Studio contracts
        run: php tests/debrief-studio-regression.php

      - name: Movie identity and schema contracts
        run: |
          set -e
          php tests/graph-growth-identity-regression.php
          php tests/movie-entity-schema-regression.php
          php tests/movie-identity-lock-regression.php

      - name: Private Movie importer contracts
        run: |
          set -e
          php tests/movie-import-contract-regression.php
          php tests/movie-importer-provider-regression.php
          php tests/movie-importer-security-regression.php
          php tests/movie-importer-regression.php
          php tests/movie-import-admin-regression.php

      - name: PHP syntax
        run: |
          set -e
          find . -name '*.php' -not -path './vendor/*' -not -path './node_modules/*' -print0 \
            | xargs -0 -n1 php -l > /dev/null
          echo "PHP clean"

      - name: JS syntax
        run: |
          set -e
          find . -name '*.js' -not -path './node_modules/*' -not -path './vendor/*' -print0 \
            | while IFS= read -r -d '' f; do node --check "$f"; done
          echo "JS clean"

      - name: CSS brace balance
        run: |
          python3 - <<'PYEOF'
          import glob, sys
          bad = []
          for f in glob.glob('**/*.css', recursive=True):
              s = open(f, encoding='utf-8', errors='ignore').read()
              if s.count('{') != s.count('}'):
                  bad.append(f)
          if bad:
              print('Unbalanced braces:', bad)
              sys.exit(1)
          print('CSS balanced')
          PYEOF
